name: Pages

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

on:
  push:
    branches: [ main ]
    tags: [ v*.*.* ]
  release:
    types: [ published ]
  repository_dispatch:
    types: [ pages ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  id-token: write
  pages: write

jobs:
  publisher:
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup (Rust)
        run: |
          rustup default nightly
          rustup target add wasm32-unknown-unknown --toolchain nightly
      - name: Setup (dioxus)
        run: cargo install dioxus-cli wasm-bindgen-cli
      - name: Build
        run: cd app && dioxus build --release
      - name: Deploy Project 🚀
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          branch: gh-pages
          clean: false
          folder: app/dist
